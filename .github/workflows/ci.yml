name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: quantum-mechanics-lab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate SwiftPM and iOS simulator build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Validate release candidate
        run: bash scripts/verify_release_candidate.sh
